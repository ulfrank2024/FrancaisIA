services:
  # ─── Cache / Sessions ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks: [francaisIA]
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      retries: 5

  # ─── Microservices ───────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    env_file: .env
    ports:
      - "4001:4001"
    networks: [francaisIA]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  content-service:
    build:
      context: .
      dockerfile: services/content-service/Dockerfile
    env_file: .env
    environment:
      AI_URL: http://ai-service:4003
    ports:
      - "4002:4002"
    networks: [francaisIA]
    depends_on:
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4002/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  ai-service:
    build: ./services/ai-service
    env_file: .env
    ports:
      - "4003:4003"
    networks: [francaisIA]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4003/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  progress-service:
    build:
      context: .
      dockerfile: services/progress-service/Dockerfile
    env_file: .env
    ports:
      - "4004:4004"
    networks: [francaisIA]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4004/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─── API Gateway ─────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    env_file: .env
    ports:
      - "4000:4000"
    networks: [francaisIA]
    depends_on:
      auth-service:
        condition: service_healthy
      content-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      progress-service:
        condition: service_healthy

  # ─── Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL}
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL}
        NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL}
        NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL}
        NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL:-/dashboard}
        NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL:-/redirect}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_ADMIN_USER_ID: ${NEXT_PUBLIC_ADMIN_USER_ID}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_STRIPE_BRONZE_URL: ${NEXT_PUBLIC_STRIPE_BRONZE_URL:-}
        NEXT_PUBLIC_STRIPE_SILVER_URL: ${NEXT_PUBLIC_STRIPE_SILVER_URL:-}
        NEXT_PUBLIC_STRIPE_GOLD_URL: ${NEXT_PUBLIC_STRIPE_GOLD_URL:-}
    env_file: .env
    ports:
      - "3001:3000"
    networks: [francaisIA]
    depends_on:
      - api-gateway

networks:
  francaisIA:
    driver: bridge

volumes:
  redis_data:
